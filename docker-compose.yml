name: codemetrics

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: node:24-bookworm-slim
    image: codemetrics-frontend:local
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - codemetrics-frontend-node-modules:/app/node_modules
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: node:24-bookworm-slim
    image: codemetrics-backend:local
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://codemetrics:codemetrics_password@mongo:27017/codemetrics?authSource=admin
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./test:/app/test
      - codemetrics-backend-node-modules:/app/node_modules
    restart: unless-stopped

  mongo:
    build:
      context: ./docker/mongo
      dockerfile: Dockerfile
    image: codemetrics-mongo:8.2-noble
    environment:
      MONGO_INITDB_ROOT_USERNAME: codemetrics
      MONGO_INITDB_ROOT_PASSWORD: codemetrics_password
      MONGO_INITDB_DATABASE: codemetrics
    volumes:
      - codemetrics-mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  codemetrics-frontend-node-modules:
  codemetrics-backend-node-modules:
  codemetrics-mongo-data:
