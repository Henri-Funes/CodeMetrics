name: codemetrics

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: node:24-bookworm-slim
    image: codemetrics-frontend:local
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - codemetrics-frontend-node-modules:/app/node_modules
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: node:24-bookworm-slim
    image: codemetrics-backend:local
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./test:/app/test
      - codemetrics-backend-node-modules:/app/node_modules
    restart: unless-stopped

volumes:
  codemetrics-frontend-node-modules:
  codemetrics-backend-node-modules:
